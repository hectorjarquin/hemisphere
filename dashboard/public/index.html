<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hemisphere</title>
<meta name="description" content="hemisphere memory dashboard">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg" type="image/svg+xml">
</head>
<body>
<div id="app" role="application" aria-label="hemisphere memory dashboard">
<header role="banner">

    <h1>hemisphere</h1>
  </div>
  <div>
    <button id="theme-btn" class="theme-btn" aria-label="Toggle theme"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor" aria-hidden="true"><path d="M337.5-463Q311-498 289-537q-5 14-6.5 28.5T281-480q0 83 58 141t141 58q14 0 28.5-2t28.5-6q-39-22-74-48.5T396-396q-32-32-58.5-67ZM567-364.5Q630-328 702-308q-40 51-98 79.5T481-200q-117 0-198.5-81.5T201-480q0-65 28.5-123t79.5-98q20 72 56.5 135T453-452q51 51 114 87.5ZM743-380q-20-5-39.5-11T665-405q8-18 11.5-36.5T680-480q0-83-58.5-141.5T480-680q-20 0-38.5 3.5T405-665q-8-19-13.5-38T381-742q24-9 49-13.5t51-4.5q117 0 198.5 81.5T761-480q0 26-4.5 51T743-380ZM440-840v-120h80v120h-80Zm0 840v-120h80V0h-80Zm323-706-57-57 85-84 57 56-85 85ZM169-113l-57-56 85-85 57 57-85 84Zm671-327v-80h120v80H840ZM0-440v-80h120v80H0Zm791 328-85-85 57-57 84 85-56 57ZM197-706l-84-85 56-57 85 85-57 57Zm199 310Z"></path></svg></button>
  </div>
</header>

<div class="filters" role="search" aria-label="Filter memories">
  <div class="filter-row">
    <div class="field">
      <label for="project">Project</label>
      <div class="combobox" id="project-combo">
        <input id="project" placeholder="Select..." autocomplete="off" role="combobox" aria-expanded="false" aria-controls="project-dropdown" aria-autocomplete="list">
        <div class="combobox-dropdown" id="project-dropdown" role="listbox" aria-label="Available projects"></div>
      </div>
    </div>
    <div class="field">
      <label for="kind">Kind</label>
      <select id="kind" aria-label="Filter by kind"><option value="">all</option></select>
    </div>
    <div class="field">
      <label for="view">View</label>
      <select id="view" aria-label="View filter"><option value="active">Active</option><option value="recycled">Deleted</option></select>
    </div>
    <div class="field search-field">
      <label for="search">Search</label>
      <input id="search" placeholder="Type to filter..." autocomplete="off" aria-label="Search memories" role="searchbox">
    </div>
  </div>
</div>
<div id="error" role="alert" aria-live="assertive"></div>
<div id="stats" role="status" aria-live="polite">Select a project</div>

<div id="loading-skeleton" aria-hidden="true" style="display:none">
  <table aria-hidden="true">
    <thead><tr><th>ID</th><th>Related</th><th>Kind</th><th>Content</th><th>Status</th><th></th><th></th></tr></thead>
    <tbody id="skeleton-body"></tbody>
  </table>
</div>

<div id="table-wrap">
  <table aria-label="Memories list">
    <thead>
      <tr><th scope="col">ID</th><th scope="col">Related</th><th scope="col">Kind</th><th scope="col">Content</th><th scope="col">Status</th><th scope="col"></th><th scope="col"><span class="sr-only">Actions</span></th></tr>
    </thead>
    <tbody id="tbody" aria-live="polite" aria-relevant="additions removals"></tbody>
  </table>
</div>
<div id="pagination" role="navigation" aria-label="Pagination"></div>
</div>

<div id="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

<dialog id="confirm-dialog">
  <div class="dialog-content">
    <p id="confirm-message"></p>
    <div class="dialog-actions">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok" class="danger">Delete</button>
    </div>
  </div>
</dialog>

<script>if(localStorage.getItem('hemisphere-theme')==='light'){document.documentElement.setAttribute('data-theme','light')}</script>
<script src="/app.js"></script>
</body>
</html>
