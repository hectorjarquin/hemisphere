<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hemisphere</title>
<meta name="description" content="Hemisphere memory dashboard">
<link rel="stylesheet" href="/basecoat-base.min.css">
<link rel="stylesheet" href="/tokens.css">
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="/logo.svg" type="image/svg+xml">
<script src="/tailwind-v4.js"></script>
<style type="text/tailwindcss">
  @custom-variant dark (&:where(.dark, .dark *));
  @layer base {
    *, ::after, ::before, ::backdrop, ::file-selector-button {
      border-color: var(--border);
    }
  }
  @theme {
    --color-background: var(--background);
    --color-foreground: var(--foreground);
    --color-card: var(--card);
    --color-card-foreground: var(--card-foreground);
    --color-popover: var(--popover);
    --color-popover-foreground: var(--popover-foreground);
    --color-primary: var(--primary);
    --color-primary-foreground: var(--primary-foreground);
    --color-secondary: var(--secondary);
    --color-secondary-foreground: var(--secondary-foreground);
    --color-muted: var(--muted);
    --color-muted-foreground: var(--muted-foreground);
    --color-accent: var(--accent);
    --color-accent-foreground: var(--accent-foreground);
    --color-destructive: var(--destructive);
    --color-destructive-foreground: var(--destructive-foreground);
    --color-border: var(--border);
    --color-input: var(--input);
    --color-ring: var(--ring);
  }
</style>
<script src="/basecoat-all.min.js" defer></script>
</head>
<body class="px-5">
<div id="app" class="max-w-4xl mx-auto">

<header class="flex items-center justify-between py-3 border-b border-border mb-4">
  <div class="flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" height="28" viewBox="0 -960 960 960" width="28" fill="currentColor" aria-hidden="true"><path d="M390-120q-51 0-88-35.5T260-241q-60-8-100-53t-40-106q0-21 5.5-41.5T142-480q-11-18-16.5-38t-5.5-42q0-61 40-105.5t99-52.5q3-51 41-86.5t90-35.5q26 0 48.5 10t41.5 27q18-17 41-27t49-10q52 0 89.5 35t40.5 86q59 8 99.5 53T840-560q0 22-5.5 42T818-480q11 18 16.5 38.5T840-400q0 62-40.5 106.5T699-241q-5 50-41.5 85.5T570-120q-25 0-48.5-9.5T480-156q-19 17-42 26.5t-48 9.5Zm130-590v460q0 21 14.5 35.5T570-200q20 0 34.5-16t15.5-36q-21-8-38.5-21.5T550-306q-10-14-7.5-30t16.5-26q14-10 30-7.5t26 16.5q11 16 28 24.5t37 8.5q33 0 56.5-23.5T760-400q0-5-.5-10t-2.5-10q-17 10-36.5 15t-40.5 5q-17 0-28.5-11.5T640-440q0-17 11.5-28.5T680-480q33 0 56.5-23.5T760-560q0-33-23.5-56T680-640q-11 18-28.5 31.5T613-587q-16 6-31-1t-20-23q-5-16 1.5-31t22.5-20q15-5 24.5-18t9.5-30q0-21-14.5-35.5T570-760q-21 0-35.5 14.5T520-710Zm-80 460v-460q0-21-14.5-35.5T390-760q-21 0-35.5 14.5T340-710q0 16 9 29.5t24 18.5q16 5 23 20t2 31q-6 16-21 23t-31 1q-21-8-38.5-21.5T279-640q-32 1-55.5 24.5T200-560q0 33 23.5 56.5T280-480q17 0 28.5 11.5T320-440q0 17-11.5 28.5T280-400q-21 0-40.5-5T203-420q-2 5-2.5 10t-.5 10q0 33 23.5 56.5T280-320q20 0 37-8.5t28-24.5q10-14 26-16.5t30 7.5q14 10 16.5 26t-7.5 30q-14 19-32 33t-39 22q1 20 16 35.5t35 15.5q21 0 35.5-14.5T440-250Zm40-230Z"/></svg>
    <h1 class="text-lg font-semibold">Hemisphere</h1>
  </div>
  <div>
    <button id="theme-btn" class="bg-transparent border-0 text-foreground cursor-pointer p-1 rounded-full hover:bg-accent focus-visible:ring-2 focus-visible:ring-ring focus-visible:outline-none" aria-label="Toggle theme"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor" aria-hidden="true"><path d="M337.5-463Q311-498 289-537q-5 14-6.5 28.5T281-480q0 83 58 141t141 58q14 0 28.5-2t28.5-6q-39-22-74-48.5T396-396q-32-32-58.5-67ZM567-364.5Q630-328 702-308q-40 51-98 79.5T481-200q-117 0-198.5-81.5T201-480q0-65 28.5-123t79.5-98q20 72 56.5 135T453-452q51 51 114 87.5ZM743-380q-20-5-39.5-11T665-405q8-18 11.5-36.5T680-480q0-83-58.5-141.5T480-680q-20 0-38.5 3.5T405-665q-8-19-13.5-38T381-742q24-9 49-13.5t51-4.5q117 0 198.5 81.5T761-480q0 26-4.5 51T743-380ZM440-840v-120h80v120h-80Zm0 840v-120h80V0h-80Zm323-706-57-57 85-84 57 56-85 85ZM169-113l-57-56 85-85 57 57-85 84Zm671-327v-80h120v80H840ZM0-440v-80h120v80H0Zm791 328-85-85 57-57 84 85-56 57ZM197-706l-84-85 56-57 85 85-57 57Zm199 310Z"></path></svg></button>
  </div>
</header>

<div class="filters mb-3" role="search" aria-label="Filter memories">
  <div class="flex items-center gap-3 flex-wrap">
    <div class="relative flex-1 min-w-[120px]">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-2.5 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground" aria-hidden="true"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
      <input id="search" class="h-8 w-full min-w-0 rounded-full border border-input bg-transparent pl-8 pr-2.5 py-1 text-base transition-colors outline-none placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 md:text-sm" placeholder="Search memories..." autocomplete="off" aria-label="Search memories" role="searchbox">
    </div>
    <div class="project-picker relative flex-1 min-w-[120px]" id="project-combo">
      <input id="project" class="h-8 w-full min-w-0 rounded-lg border border-input bg-transparent pl-2.5 pr-8 py-1 text-base transition-colors outline-none placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 md:text-sm" placeholder="Project..." autocomplete="off" role="combobox" aria-expanded="false" aria-controls="project-dropdown" aria-autocomplete="list">
      <button type="button" id="project-clear" class="absolute right-2 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground hidden" aria-label="Clear project">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <div class="project-picker-dropdown" id="project-dropdown" role="listbox" aria-label="Available projects"></div>
    </div>
    <select id="kind" class="h-8 min-w-[120px] rounded-lg border border-input bg-transparent px-2.5 py-2 text-sm text-muted-foreground transition-colors outline-none focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 flex-1"><option value="" disabled selected>Kind</option></select>
    <select id="status-filter" class="h-8 min-w-[120px] rounded-lg border border-input bg-transparent px-2.5 py-2 text-sm text-muted-foreground transition-colors outline-none focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 flex-1"><option value="" disabled selected>Status</option></select>
    <select id="view" class="h-8 min-w-[120px] rounded-lg border border-input bg-transparent px-2.5 py-2 text-sm text-muted-foreground transition-colors outline-none focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 flex-1"><option value="" disabled selected>View</option><option value="active">Active</option><option value="archived">Archived</option><option value="recycled">Trashed</option></select>
  </div>
</div>

<div id="error" class="hidden bg-destructive/10 text-foreground py-2 px-3 rounded mb-2 text-[13px]" role="alert" aria-live="assertive"></div>

<div id="loading-skeleton" class="hidden" aria-hidden="true">
  <table aria-hidden="true">
    <thead><tr><th>Content</th><th>Kind</th><th>Project</th><th>Related</th><th>Status</th><th></th><th>ID</th><th></th></tr></thead>
    <tbody id="skeleton-body"></tbody>
  </table>
</div>

<div id="table-wrap" class="flex flex-col gap-4 rounded-xl bg-card py-4 text-sm text-card-foreground ring-1 ring-foreground/10">
  <div id="stats" class="text-xs text-muted-foreground px-4" role="status" aria-live="polite">Select a project</div>
  <div class="relative w-full overflow-x-auto">
    <table class="table w-full caption-bottom text-sm [&amp;_td]:align-top" aria-label="Memories list">
      <thead>
        <tr><th class="h-10 px-2 text-left font-medium">Content</th><th class="h-10 px-2 text-left font-medium">Kind</th><th class="h-10 px-2 text-left font-medium">Project</th><th class="h-10 px-2 text-left font-medium">Related</th><th class="h-10 px-2 text-left font-medium">Status</th><th class="h-10 px-2 text-left font-medium"></th><th class="h-10 px-2 text-left font-medium">ID</th><th class="h-10 px-2 text-left font-medium"><span class="sr-only">Actions</span></th></tr>
      </thead>
      <tbody id="tbody" aria-live="polite" aria-relevant="additions removals"></tbody>
    </table>
  </div>
</div>

<div id="pagination" class="flex justify-center items-center gap-2 py-3 text-[13px]" role="navigation" aria-label="Pagination"></div>

<div id="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

<dialog id="confirm-dialog" class="bg-background text-foreground border border-border rounded-lg p-0 max-w-[380px] w-full shadow-2xl m-auto">
  <div class="p-6">
    <p id="confirm-message" class="text-sm mb-5 leading-relaxed"></p>
    <div class="flex justify-end gap-2">
      <button id="confirm-cancel" class="py-1.5 px-4 rounded text-[13px] cursor-pointer border border-border bg-accent text-foreground hover:bg-muted">Cancel</button>
      <button id="confirm-ok" class="py-1.5 px-4 rounded text-[13px] cursor-pointer border border-destructive/40 bg-destructive/20 text-destructive hover:bg-destructive/35">Trash</button>
    </div>
  </div>
</dialog>

<!-- preview dialog -->
<dialog id="preview-dialog" class="bg-background text-foreground border border-border rounded-xl shadow-lg max-w-[min(90vw,42rem)] p-0 m-auto" onclick="if (event.target === this) this.close()">
  <div class="p-6">
    <header>
      <div id="preview-meta" class="flex items-center gap-0.5 mb-1 text-xs flex-wrap"></div>
      <h2 id="preview-title" class="text-base font-semibold"></h2>
      <div class="flex items-center gap-1 mt-2 mb-3">
        <button id="preview-back" class="inline-flex items-center justify-center h-8 w-8 rounded-full hover:bg-accent disabled:opacity-30 disabled:cursor-default" disabled aria-label="Go back"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
        <button id="preview-forward" class="inline-flex items-center justify-center h-8 w-8 rounded-full hover:bg-accent disabled:opacity-30 disabled:cursor-default" disabled aria-label="Go forward"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>
        <select id="preview-refby-select" class="h-8 rounded-lg border border-input bg-transparent px-2.5 py-2 text-sm text-muted-foreground transition-colors outline-none focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50" disabled><option value="" disabled selected>Referenced by</option></select>
        <select id="preview-related-select" class="h-8 rounded-lg border border-input bg-transparent px-2.5 py-2 text-sm text-muted-foreground transition-colors outline-none focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50" disabled><option value="" disabled selected>Related</option></select>
      </div>
    </header>
    <section class="-mx-6 max-h-[60vh] overflow-y-auto px-6">
      <div id="preview-loading" class="text-sm text-muted-foreground py-8 text-center hidden">Loading...</div>
      <pre id="preview-body" class="whitespace-pre-wrap text-sm leading-relaxed"></pre>
    </section>
    <footer class="flex justify-end gap-2 pt-3">
      <button class="btn rounded-full cursor-pointer" data-variant="outline" onclick="this.closest('dialog').close()">Close</button>
    </footer>
    <button type="button" class="inline-flex items-center justify-center h-8 w-8 rounded-full hover:bg-accent absolute top-2 right-2" aria-label="Close" onclick="this.closest('dialog').close()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
</dialog>

<script>if(localStorage.getItem('hemisphere-theme')==='dark'){document.documentElement.classList.add('dark')}</script>
<script src="/app.js"></script>
</div>
</body>
</html>
